app = "saigon-rush-ws"
primary_region = "sin"

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "8080"
  CLIENT_URL = "https://saigon-rush.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
